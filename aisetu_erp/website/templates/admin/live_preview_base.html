{% extends "admin/change_form.html" %}

{% block content %}

<style>

.admin-preview-layout{
    display:grid;
    grid-template-columns: 1fr 1.2fr;
    gap:20px;
}

.admin-edit-section{
    min-width:0;
}

.preview-section{
    border-left:1px solid #ddd;
    padding-left:20px;
    position: sticky;
    top: 20px;
}

.preview-header{
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.preview-section iframe{
    width:100%;
    height:85vh;
    border:1px solid #ddd;
    border-radius:6px;
    background: #fff;
}

.badge-live {
    background: #4caf50;
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    text-transform: uppercase;
}

</style>

<div class="admin-preview-layout">

    <!-- LEFT SIDE : DJANGO ADMIN FIELDS -->
    <div class="admin-edit-section">

        {{ block.super }}

    </div>

    <!-- RIGHT SIDE : WEBSITE PREVIEW -->
    <div class="preview-section">

        <div class="preview-header">
            <span>Live Website Preview</span>
            <span class="badge-live">Live</span>
        </div>

        <iframe
            id="livePreview"
            src="{{ preview_url }}"
        ></iframe>

    </div>

</div>


<script>

function reloadPreview(){
    const iframe = document.getElementById("livePreview")
    if(iframe){
        iframe.src = iframe.src
    }
}

function sendPreviewData(){

    const data = {}

    // Collect all inputs, textareas, and selects
    document.querySelectorAll("input, textarea, select").forEach(field => {

        if(field.id){
            const key = field.id.replace("id_","")
            
            if (field.type === 'checkbox') {
                data[key] = field.checked
            } else if (field.type === 'file') {
                // We can't easily sync files in real-time without uploading
                // but we can send the filename if useful
            } else {
                data[key] = field.value
            }
        }

    })

    const iframe = document.getElementById("livePreview")

    if(iframe && iframe.contentWindow){
        iframe.contentWindow.postMessage({
            source: 'django-admin',
            model: '{{ model_name }}',
            pk: '{{ original_pk }}',
            scrollTarget: '{{ scroll_target }}',
            payload: data
        }, "*")
    }

}

/* live preview when typing */
document.addEventListener("input", function(){

    clearTimeout(window.previewTimer)

    window.previewTimer = setTimeout(sendPreviewData, 300)

})

/* reload preview when admin clicks save */
document.addEventListener("DOMContentLoaded", function(){

    const saveButtons = document.querySelectorAll("input[name=_save], input[name=_continue], input[name=_addanother]")

    saveButtons.forEach(btn => {
        btn.addEventListener("click", function(){
            setTimeout(reloadPreview, 1000)
        })
    })
    
    // Initial sync
    setTimeout(sendPreviewData, 1000)

})

</script>

{% endblock %}
